kind = "web"
previewPath = "/"
title = "DueNext AI"
version = "1.0.0"
id = "artifacts/duenext-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23764
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/duenext-ai run dev"

[services.env]
PORT = "23764"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/duenext-ai", "run", "build"]
publicDir = "artifacts/duenext-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
